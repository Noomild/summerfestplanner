<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Fest 2026 — Activity Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;800;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #7dd3fc;
    --ocean: #0369a1;
    --deep: #082f49;
    --coral: #fb7185;
    --mint: #34d399;
    --yellow: #fbbf24;
    --lavender: #a78bfa;
    --white: #f0f9ff;
    --card-bg: rgba(255,255,255,0.12);
    --card-border: rgba(255,255,255,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: linear-gradient(135deg, #0c1445 0%, #0a3166 30%, #0e5a82 60%, #1a7a8a 100%);
    min-height: 100vh;
    color: var(--white);
    overflow-x: hidden;
  }

  /* Floating bubbles background */
  .bubbles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), rgba(125,211,252,0.1));
    border: 1px solid rgba(255,255,255,0.15);
    animation: floatBubble linear infinite;
  }

  @keyframes floatBubble {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 0 28px;
    animation: fadeDown 0.7s ease both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header-badge {
    display: inline-block;
    background: linear-gradient(90deg, var(--coral), var(--lavender));
    font-family: 'Kanit', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 20px;
    margin-bottom: 12px;
    color: white;
  }

  .header h1 {
    font-family: 'Kanit', sans-serif;
    font-size: clamp(28px, 6vw, 54px);
    font-weight: 900;
    line-height: 1.05;
    background: linear-gradient(135deg, #fff 0%, var(--sky) 50%, var(--mint) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(125,211,252,0.4));
  }

  .header-sub {
    margin-top: 8px;
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* Day Tabs */
  .day-tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 24px 0 20px;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-tab {
    font-family: 'Kanit', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 30px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.5px;
  }
  .day-tab:hover { background: rgba(255,255,255,0.15); color: white; }
  .day-tab.active {
    background: linear-gradient(135deg, var(--coral), var(--lavender));
    border-color: transparent;
    color: white;
    box-shadow: 0 4px 20px rgba(251,113,133,0.4);
  }

  /* Main layout */
  .main-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 16px;
    animation: fadeUp 0.6s 0.35s ease both;
  }

  @media (max-width: 720px) {
    .main-layout { grid-template-columns: 1fr; }
  }

  /* Panel card */
  .panel {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: 20px;
  }

  .panel-title {
    font-family: 'Kanit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--sky);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title svg { flex-shrink: 0; }

  /* Member search */
  .search-box {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 8px 12px;
    color: white;
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box::placeholder { color: rgba(255,255,255,0.4); }
  .search-box:focus { border-color: var(--sky); }

  /* Member list */
  .member-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 560px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .member-list::-webkit-scrollbar { width: 4px; }
  .member-list::-webkit-scrollbar-track { background: transparent; }
  .member-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

  .member-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .member-item:hover { background: rgba(255,255,255,0.08); }
  .member-item.checked { background: rgba(125,211,252,0.12); }

  .member-item input[type="checkbox"] { display: none; }
  .checkmark {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 2px solid rgba(255,255,255,0.3);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }
  .member-item.checked .checkmark {
    background: linear-gradient(135deg, var(--sky), var(--mint));
    border-color: transparent;
  }
  .checkmark svg { display: none; }
  .member-item.checked .checkmark svg { display: block; }

  .member-name {
    font-family: 'Kanit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
  }
  .member-item.checked .member-name { color: white; }

  .member-count-dot {
    margin-left: auto;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Kanit', sans-serif;
    background: rgba(125,211,252,0.2);
    color: var(--sky);
    padding: 1px 6px;
    border-radius: 10px;
  }

  /* Quick actions */
  .quick-actions {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .quick-btn {
    flex: 1;
    font-family: 'Kanit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 8px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .quick-btn:hover { background: rgba(255,255,255,0.14); color: white; }

  /* Schedule panel */
  .schedule-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .selected-count {
    font-family: 'Kanit', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.55);
  }
  .selected-count span {
    color: var(--mint);
    font-weight: 700;
  }

  .no-selection {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.35);
  }
  .no-selection .big-icon { font-size: 48px; margin-bottom: 12px; }
  .no-selection p { font-family: 'Kanit', sans-serif; font-size: 15px; }

  /* Activity color coding */
  .activity-tag {
    display: inline-block;
    font-size: 10px;
    font-family: 'Kanit', sans-serif;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 6px;
    margin-right: 4px;
    margin-bottom: 2px;
    letter-spacing: 0.3px;
  }
  .act-merch { background: rgba(251,191,36,0.25); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
  .act-hachi { background: rgba(251,113,133,0.25); color: #fb7185; border: 1px solid rgba(251,113,133,0.3); }
  .act-hub   { background: rgba(167,139,250,0.25); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }
  .act-shoot { background: rgba(52,211,153,0.25); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
  .act-dome  { background: rgba(125,211,252,0.25); color: #7dd3fc; border: 1px solid rgba(125,211,252,0.3); }
  .act-smg   { background: rgba(248,113,113,0.25); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
  .act-doo   { background: rgba(74,222,128,0.25); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
  .act-mai   { background: rgba(251,146,60,0.25); color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }

  /* Time slots */
  .time-block {
    margin-bottom: 10px;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .time-block:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,0,0,0.25); }

  .time-block-header {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    gap: 10px;
  }
  .time-label {
    font-family: 'Kanit', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--yellow);
    white-space: nowrap;
    min-width: 95px;
  }
  .time-activities-summary {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }

  .time-block-body {
    padding: 10px 14px 12px;
    background: rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .activity-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .activity-name-tag { flex-shrink: 0; width: 90px; }
  .activity-members-list {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .member-pill {
    font-family: 'Kanit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    color: white;
  }
  .pill-highlight {
    background: linear-gradient(135deg, var(--coral), var(--lavender));
    box-shadow: 0 2px 8px rgba(251,113,133,0.35);
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  /* Empty state per slot */
  .empty-slot {
    padding: 20px;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 13px;
  }

  .summary-strip {
    background: linear-gradient(135deg, rgba(125,211,252,0.12), rgba(167,139,250,0.12));
    border: 1px solid rgba(125,211,252,0.2);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .summary-strip-label {
    font-family: 'Kanit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--sky);
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .summary-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .summary-chip {
    font-family: 'Kanit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--coral), var(--lavender));
    color: white;
  }
</style>
</head>

// Extract all unique members
const ALL_MEMBERS = [...new Set(
  Object.values(SCHEDULE).flat().flatMap(s => s.members)
)].sort();

let selectedMembers = new Set();
let currentDay = 'fri';
let searchTerm = '';

// ============================================================
// BUBBLES
// ============================================================
function createBubbles() {
  const container = document.getElementById('bubbles');
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = Math.random() * 60 + 20;
    b.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 15 + 10}s;
      animation-delay: ${Math.random() * 10}s;
    `;
    container.appendChild(b);
  }
}

// ============================================================
// MEMBER LIST
// ============================================================
function renderMemberList() {
  const container = document.getElementById('memberList');
  const filtered = ALL_MEMBERS.filter(m =>
    m.toLowerCase().includes(searchTerm.toLowerCase())
  );

  // Count activities per member for current day
  const counts = {};
  (SCHEDULE[currentDay] || []).forEach(s => {
    s.members.forEach(m => {
      counts[m] = (counts[m] || 0) + 1;
    });
  });

  container.innerHTML = filtered.map(m => {
    const checked = selectedMembers.has(m);
    const cnt = counts[m] || 0;
    return `
      <div class="member-item ${checked ? 'checked' : ''}" onclick="toggleMember('${m}')">
        <div class="checkmark">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="member-name">${m}</span>
        ${cnt > 0 ? `<span class="member-count-dot">${cnt}</span>` : ''}
      </div>`;
  }).join('');
}

function toggleMember(name) {
  if (selectedMembers.has(name)) {
    selectedMembers.delete(name);
  } else {
    selectedMembers.add(name);
  }
  renderMemberList();
  renderSchedule();
}

function filterMembers() {
  searchTerm = document.getElementById('memberSearch').value;
  renderMemberList();
}

function selectAll() {
  ALL_MEMBERS.forEach(m => selectedMembers.add(m));
  renderMemberList();
  renderSchedule();
}

function clearAll() {
  selectedMembers.clear();
  renderMemberList();
  renderSchedule();
}

// ============================================================
// DAY TABS
// ============================================================
function setDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-tab').forEach((t, i) => {
    t.classList.toggle('active', ['fri','sat','sun'][i] === day);
  });
  renderSchedule();
  renderMemberList();
}

// ============================================================
// SCHEDULE RENDER
// ============================================================
function renderSchedule() {
  const content = document.getElementById('scheduleContent');
  const selCount = document.getElementById('selCount');
  const summaryStrip = document.getElementById('summaryStrip');
  const summaryChips = document.getElementById('summaryChips');

  selCount.textContent = selectedMembers.size;

  // Summary strip
  if (selectedMembers.size > 0) {
    summaryStrip.style.display = 'flex';
    summaryChips.innerHTML = [...selectedMembers].map(m =>
      `<span class="summary-chip">${m}</span>`
    ).join('');
  } else {
    summaryStrip.style.display = 'none';
  }

  if (selectedMembers.size === 0) {
    content.innerHTML = `
      <div class="no-selection">
        <div class="big-icon">🌊</div>
        <p>เลือก Member เพื่อดูตารางกิจกรรม</p>
      </div>`;
    return;
  }

  const dayData = SCHEDULE[currentDay] || [];

  // Group by time
  const timeMap = {};
  dayData.forEach(slot => {
    if (!timeMap[slot.time]) timeMap[slot.time] = [];
    timeMap[slot.time].push(slot);
  });

  // Filter: only times where at least one selected member appears
  const relevantTimes = Object.keys(timeMap)
    .filter(t => timeMap[t].some(s => s.members.some(m => selectedMembers.has(m))))
    .sort();

  if (relevantTimes.length === 0) {
    content.innerHTML = `
      <div class="no-selection">
        <div class="big-icon">🔍</div>
        <p>ไม่พบกิจกรรมสำหรับ member ที่เลือก</p>
      </div>`;
    return;
  }

  content.innerHTML = relevantTimes.map(time => {
    const slots = timeMap[time];
    const relevantSlots = slots.filter(s => s.members.some(m => selectedMembers.has(m)));

    const actTags = [...new Set(relevantSlots.map(s => s.act))].map(a =>
      `<span class="activity-tag ${ACTIVITIES[a].cls}">${ACTIVITIES[a].label}</span>`
    ).join('');

    const rows = relevantSlots.map(s => {
      const pills = s.members.map(m => {
        const isSelected = selectedMembers.has(m);
        return `<span class="member-pill ${isSelected ? 'pill-highlight' : ''}" style="${isSelected ? '' : 'background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.55);'}">${m}</span>`;
      }).join('');
      return `
        <div class="activity-row">
          <div class="activity-name-tag">
            <span class="activity-tag ${ACTIVITIES[s.act].cls}">${ACTIVITIES[s.act].label}</span>
          </div>
          <div class="activity-members-list">${pills}</div>
        </div>`;
    }).join('');

    return `
      <div class="time-block">
        <div class="time-block-header">
          <span class="time-label">🕐 ${time}</span>
          <div class="time-activities-summary">${actTags}</div>
        </div>
        <div class="time-block-body">${rows}</div>
      </div>`;
  }).join('');
}
